<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Meus Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-color: #050807;          /* fundo base (escuro) */
      --card-bg: rgba(7, 14, 10, 0.95);
      --text-color: #e9f5e1;
      --accent-color: #2f5233;     /* verde militar */
      --accent-hover: #3c6941;
      --border-color: #5b8a5a;
      --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-color);
      /* Imagem de fundo (ajuste extensão se for .png) */
      background-image: url("img/bg.jpg");
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      backdrop-filter: blur(2px);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15, 30, 20, 0.75), rgba(0, 0, 0, 0.95));
      z-index: -1;
    }

    .wrapper {
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(91, 138, 90, 0.5);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 1px solid rgba(200, 255, 200, 0.03);
      pointer-events: none;
    }

    .banner {
      width: 100%;
      max-height: 160px;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 1px solid rgba(91, 138, 90, 0.6);
    }

    .banner img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .title {
      font-size: 1.5rem;
      margin: 0;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #d6f5c9;
    }

    .subtitle {
      font-size: 0.9rem;
      margin: 6px 0 16px;  /* margem pequena logo depois do título */
      text-align: center;
      color: #a5c9a2;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .link-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      background: radial-gradient(circle at top left, #2f5233, #111a13);
      color: #f0fff0;
      border: 1px solid rgba(91, 138, 90, 0.6);
      transition: background 0.15s ease, transform 0.1s ease,
                  box-shadow 0.15s ease, border-color 0.15s ease;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.7);
      position: relative;
    }

    .link-item::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      border: 1px solid rgba(220, 255, 220, 0.06);
      pointer-events: none;
    }

    .link-label {
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .link-description {
      font-size: 0.78rem;
      margin-top: 3px;
      color: #d1e5cf;
      opacity: 0.9;
    }

    .link-item:hover {
      background: radial-gradient(circle at top left, #3c6941, #151f16);
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.9);
      border-color: rgba(180, 230, 180, 0.9);
    }

    .link-item:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }

    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 0.75rem;
      color: #849d82;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 14px 12px 12px;
      }

      .title {
        font-size: 1.3rem;
      }

      .banner {
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="wrapper">
    <div class="card">
      <!-- Banner (ajustado para banner.png) -->
      <div id="banner" class="banner hidden">
        <img src="img/banner.png" alt="Banner">
      </div>

      <h1 id="page-title" class="title">Carregando...</h1>
      <p id="page-subtitle" class="subtitle hidden"></p>

      <div id="links-container" class="links">
        <!-- Links via JavaScript -->
      </div>

      <div id="page-footer" class="footer hidden"></div>
    </div>
  </div>

  <script>
    async function carregarConfiguracao() {
      try {
        const resp = await fetch('links.json', { cache: 'no-store' });
        if (!resp.ok) {
          throw new Error('Erro ao carregar links.json: ' + resp.status);
        }

        const data = await resp.json();
        aplicarConfiguracaoBasica(data);
        montarLinks(data.links || []);
      } catch (err) {
        console.error(err);
        document.getElementById('page-title').textContent =
          'Erro ao carregar configuração';
      }
    }

    function aplicarConfiguracaoBasica(data) {
      const titleEl = document.getElementById('page-title');
      if (data.title) {
        titleEl.textContent = data.title;
        document.title = data.title;
      } else {
        titleEl.textContent = 'Meus Links';
      }

      const subtitleEl = document.getElementById('page-subtitle');
      if (data.subtitle) {
        subtitleEl.textContent = data.subtitle;
        subtitleEl.classList.remove('hidden');
      }

      const footerEl = document.getElementById('page-footer');
      if (data.footer) {
        footerEl.textContent = data.footer;
        footerEl.classList.remove('hidden');
      }

      // Tema via JSON (opcional)
      const root = document.documentElement;
      if (data.theme) {
        if (data.theme.bgColor) root.style.setProperty('--bg-color', data.theme.bgColor);
        if (data.theme.cardBg) root.style.setProperty('--card-bg', data.theme.cardBg);
        if (data.theme.textColor) root.style.setProperty('--text-color', data.theme.textColor);
        if (data.theme.accentColor) root.style.setProperty('--accent-color', data.theme.accentColor);
        if (data.theme.accentHover) root.style.setProperty('--accent-hover', data.theme.accentHover);
      }

      // Banner: mostra por padrão, a menos que showBanner = false no JSON
      const bannerEl = document.getElementById('banner');
      if (data.showBanner === false) {
        bannerEl.classList.add('hidden');
      } else {
        bannerEl.classList.remove('hidden');
      }
    }

    function montarLinks(links) {
      const container = document.getElementById('links-container');
      container.innerHTML = '';

      if (!Array.isArray(links) || links.length === 0) {
        const msg = document.createElement('p');
        msg.textContent = 'Nenhum link configurado.';
        msg.style.textAlign = 'center';
        msg.style.color = '#a5c9a2';
        msg.style.fontSize = '0.9rem';
        container.appendChild(msg);
        return;
      }

      links.forEach(link => {
        if (!link.url || !link.label) return;

        const a = document.createElement('a');
        a.className = 'link-item';
        a.href = link.url;
        a.target = link.target || '_blank';
        a.rel = 'noopener noreferrer';

        const labelSpan = document.createElement('span');
        labelSpan.className = 'link-label';
        labelSpan.textContent = link.label;
        a.appendChild(labelSpan);

        if (link.description) {
          const descSpan = document.createElement('span');
          descSpan.className = 'link-description';
          descSpan.textContent = link.description;
          a.appendChild(descSpan);
        }

        container.appendChild(a);
      });
    }

    carregarConfiguracao();
  </script>
</body>
</html>
